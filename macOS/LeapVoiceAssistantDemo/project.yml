name: LeapVoiceAssistantDemo
options:
  bundleIdPrefix: ai.liquid.leap
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    macOS: "15.0"

configs:
  Debug: debug
  Release: release

settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"

packages:
  LeapSDK:
    url: https://github.com/Liquid4All/leap-sdk
    exactVersion: 0.10.0

targets:
  LeapVoiceAssistantDemo:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: LeapVoiceAssistantDemo
    dependencies:
      - package: LeapSDK
        product: LeapUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.liquid.leap.LeapVoiceAssistantDemo
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SDKROOT: macosx
        SUPPORTED_PLATFORMS: macosx
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_LSApplicationCategoryType: ""
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Leap AI Voice Demo needs microphone access to record your speech for on-device AI processing."
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: NO
        ENABLE_PREVIEWS: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
