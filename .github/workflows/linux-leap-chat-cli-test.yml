name: Linux LeapChatCli Build
on:
  push:
    branches: [ main ]
    paths:
      - 'Linux/LeapChatCli/**'
      - '.github/workflows/linux-leap-chat-cli-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Linux/LeapChatCli/**'
      - '.github/workflows/linux-leap-chat-cli-test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Linux/LeapChatCli
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Cache Kotlin/Native distribution
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('Linux/LeapChatCli/gradle/libs.versions.toml') }}
      - name: Cache downloaded model
        uses: actions/cache@v4
        with:
          path: Linux/LeapChatCli/leap_models
          key: leap-models-LFM2-350M-Q8_0-v1
      - name: Build native executable
        run: ./gradlew linkReleaseExecutableLinuxX64
      - name: Smoke test (download model, open + close conversation)
        run: |
          set -euo pipefail
          # Pipe :quit to exit immediately after the model is loaded. Verifies the
          # cinterop binding + native libs from leap-sdk-linuxx64:natives@zip work
          # end to end (model download → loadModel → createConversation → unload).
          printf ':quit\n' | timeout 900 build/bin/linuxX64/releaseExecutable/leap-chat-cli.kexe \
            > stdout.log 2> stderr.log
          echo "--- stdout ---"; cat stdout.log
          echo "--- stderr ---"; cat stderr.log
          grep -q 'ready (model id:' stdout.log
