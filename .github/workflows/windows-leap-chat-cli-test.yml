name: Windows LeapChatCli Build
on:
  push:
    branches: [ main ]
    paths:
      - 'Windows/LeapChatCli/**'
      - '.github/workflows/windows-leap-chat-cli-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Windows/LeapChatCli/**'
      - '.github/workflows/windows-leap-chat-cli-test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke-test:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Windows/LeapChatCli
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Cache Kotlin/Native distribution
        uses: actions/cache@v4
        with:
          path: ~\.konan
          key: konan-${{ runner.os }}-${{ hashFiles('Windows/LeapChatCli/gradle/libs.versions.toml') }}
      - name: Cache downloaded model
        uses: actions/cache@v4
        with:
          path: Windows/LeapChatCli/leap_models
          key: leap-models-LFM2-350M-Q8_0-v1
      - name: Build native executable
        run: .\gradlew.bat linkReleaseExecutableMingwX64
      - name: Smoke test (download model, open + close conversation)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          # Pipe :quit to exit immediately after the model is loaded. Verifies the
          # cinterop binding + native DLLs from leap-sdk-mingwx64:natives@zip work
          # end to end (model download → loadModel → createConversation → unload).
          ':quit' | & .\build\bin\mingwX64\releaseExecutable\leap-chat-cli.exe `
            *> output.log
          Write-Host "--- output ---"
          Get-Content output.log
          if (-not (Select-String -Path output.log -Pattern 'ready \(model id:' -Quiet)) {
            throw "expected 'ready (model id:' in output, but did not find it"
          }
