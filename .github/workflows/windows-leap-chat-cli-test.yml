name: Windows LeapChatCli Build
on:
  push:
    branches: [ main ]
    paths:
      - 'Windows/LeapChatCli/**'
      - '.github/workflows/windows-leap-chat-cli-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Windows/LeapChatCli/**'
      - '.github/workflows/windows-leap-chat-cli-test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke-test:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Windows/LeapChatCli
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Cache Kotlin/Native distribution
        uses: actions/cache@v4
        with:
          path: ~\.konan
          key: konan-${{ runner.os }}-${{ hashFiles('Windows/LeapChatCli/gradle/libs.versions.toml') }}
      - name: Cache downloaded model
        uses: actions/cache@v4
        with:
          path: Windows/LeapChatCli/leap_models
          key: leap-models-LFM2-350M-Q8_0-v1
      - name: Build native executable
        run: .\gradlew.bat linkReleaseExecutableMingwX64
      - name: Smoke test (binary launches + Kotlin entry point runs)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          # Just `--help` — verifies the .exe loads (which exercises the cinterop
          # binding + co-located loading of inference_engine.dll +
          # libinference_engine_llamacpp_backend.dll + ie_zip.dll end to end) and
          # the Kotlin entry point runs.
          #
          # We can't go further with a real model download here: the published
          # libinference_engine_llamacpp_backend.dll has the same runtime CPU-baseline
          # mismatch with github-hosted windows-latest runners that the Linux .so has
          # with ubuntu-latest — the binary crashes silently after the llama backend
          # init. End-to-end download + chat works on hosts with the right CPU
          # baseline (see JVM/LeapChatCli for the portable JNI-based equivalent).
          & .\build\bin\mingwX64\releaseExecutable\leap-chat-cli.exe --help *> output.log
          $exit_code = $LASTEXITCODE
          Write-Host "--- exit code: $exit_code (hex: 0x$('{0:X8}' -f $exit_code)) ---"
          Write-Host "--- output ---"
          Get-Content output.log
          Write-Host "--- files in releaseExecutable dir ---"
          Get-ChildItem build\bin\mingwX64\releaseExecutable | Select-Object Name, Length | Format-Table
          if ($exit_code -ne 0) {
            # 0xC0000135 = STATUS_DLL_NOT_FOUND. Try to identify which DLL.
            Write-Host "--- DLL imports of leap-chat-cli.exe (objdump from Konan toolchain) ---"
            $objdump = Get-ChildItem -Path "$env:USERPROFILE\.konan\dependencies" -Filter "*objdump*.exe" -Recurse | Select-Object -First 1
            if ($objdump) {
              & $objdump.FullName -p .\build\bin\mingwX64\releaseExecutable\leap-chat-cli.exe 2>&1 |
                Select-String "DLL Name:" |
                ForEach-Object { Write-Host $_.Line }
            } else {
              Write-Host "(objdump not found in Konan toolchain)"
            }
            throw "binary exited with code $exit_code"
          }
          if (-not (Select-String -Path output.log -Pattern 'usage: leap-chat-cli' -Quiet)) {
            throw "expected 'usage: leap-chat-cli' in output, but did not find it"
          }
