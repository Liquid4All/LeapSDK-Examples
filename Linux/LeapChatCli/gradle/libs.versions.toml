[versions]
kotlin = "2.3.20"
coroutines = "1.10.2"
leapSdk = "0.10.3-SNAPSHOT"
ktor = "3.3.3"

[libraries]
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
leap-sdk                = { module = "ai.liquid.leap:leap-sdk", version.ref = "leapSdk" }
# Curl engine for Ktor on linuxX64 — the leap-sdk-linuxx64 artifact pulls in
# ktor-client-cio which has no TLS support on Kotlin/Native, so HTTPS calls
# (e.g. LeapDownloader hitting leap.liquid.ai) fail with "TLS sessions are not
# supported on Native platform." Adding the Curl engine and passing
# `HttpClient(Curl)` to LeapDownloader gives us TLS via libcurl + openssl.
ktor-client-curl        = { module = "io.ktor:ktor-client-curl",  version.ref = "ktor" }

[plugins]
kotlin-multiplatform   = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
leap-sdk-native-libs   = { id = "ai.liquid.leap.nativelibs",          version.ref = "leapSdk" }
