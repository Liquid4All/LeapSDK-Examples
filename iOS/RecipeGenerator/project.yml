name: RecipeGenerator
options:
  bundleIdPrefix: ai.liquid
packages:
  LeapSDK:
    url: https://github.com/Liquid4All/leap-sdk
    exactVersion: 0.10.4-SNAPSHOT
targets:
  RecipeGenerator:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: 18.0
    info:
      path: RecipeGenerator/Info.plist
    sources: [RecipeGenerator]
    dependencies:
      - package: LeapSDK
        product: LeapModelDownloader
    settings:
      base:
        OTHER_LDFLAGS: "$(inherited) -L$(BUILT_PRODUCTS_DIR)/LeapSDK.framework/Frameworks -linference_engine -linference_engine_llamacpp_backend"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/Frameworks/LeapSDK.framework/Frameworks"
    postBuildScripts:
      - name: Sign nested LeapSDK dylibs
        shell: /bin/sh
        basedOnDependencyAnalysis: false
        script: |
          set -e
          NESTED="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Frameworks/LeapSDK.framework/Frameworks"
          [ -d "$NESTED" ] || exit 0
          [ "$CODE_SIGNING_ALLOWED" = "YES" ] || exit 0
          find "$NESTED" -name "*.dylib" | while read dylib; do
            codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --timestamp=none "$dylib"
          done
