name: RecipeGenerator
options:
  bundleIdPrefix: ai.liquid
packages:
  LeapSDK:
    url: https://github.com/Liquid4All/leap-sdk
    revision: 68edfe397a6f55e86b36e0ba6c0e69edc7a4d48d
targets:
  RecipeGenerator:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: 18.0
    info:
      path: RecipeGenerator/Info.plist
    sources: [RecipeGenerator]
    dependencies:
      - package: LeapSDK
        product: LeapModelDownloader
    settings:
      base:
        OTHER_LDFLAGS: "$(inherited) -L$(BUILT_PRODUCTS_DIR)/LeapSDK.framework/Frameworks -linference_engine -linference_engine_llamacpp_backend"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/Frameworks/LeapSDK.framework/Frameworks"
